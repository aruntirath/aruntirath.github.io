    <script>
        // Pristine data mapping for all individual items from your SQL layer
        const versesData = [
            { id: 1, s: "श्रीशं कमलपत्राक्षं देवकीनन्दनं हरिम्‌।<br>सुतसम्प्राप्तये कृष्णं नमामि मधुसूदनम्‌ ॥१॥", h: "मैं पुत्र की प्राप्ति के लिये लक्ष्मी पति, कमलनयन, देवकी नन्दन तथा सर्वपापहारी, मधुसूदन, श्री कृष्ण को नमस्कार करता हूँ ॥1॥" },
            { id: 2, s: "नमाम्यहं वासुदेवं सुतसम्प्राप्तये हरिम्‌।<br>यशोदाह्‍गतं बालं गोपालं नन्दनन्दनम्‌ ॥२॥", h: "मैं पुत्र प्राप्ति के उद्देश्य से उन वासुदेव श्री हरि को प्रणाम करता हूँ, जो यशोदा के अंक में बाल गोपाल रूप से विराजमान हैं और नन्दन को आनन्द दे रहे हैं ॥2॥" },
            { id: 3, s: "अस्माकं पुत्रलाभाय गोविन्दं मुनिवन्दितम्‌<br>नमाम्यहं वासुदेव॑ देवकीनन्दनं॑ सदा ॥३॥", h: "अपने को पुत्र की प्राप्ति के लिये मैं मुनिवन्दित वासुदेव देव की नन्दन गोविन्द को सदा नमस्कार करता हूँ ॥3॥" },
            { id: 4, s: "गोपालं डिम्भकं वन्दे कमलापतिमच्युतम्‌ ।<br>पुत्रसम्प्राप्तये कृष्णं नमामि यदुपुड्भवम्‌ ॥४॥", h: "मैं पुत्र पाने की कामना से उन यदुकुलतिलक श्री कृष्ण को नमस्कार करता हूँ, जो साक्षात्‌ कमला पति अच्युत (विष्णु) होकर भी गोपबालक रूप से गौओं की रक्षा में लगे हुए हैं ॥4॥" },
            { id: 5, s: "पुत्रकामेष्टिफलदं कंजाक्षं कमलापतिम्‌ ।<br>देवकीनन्दनं बन्दे सुतसम्प्राप्ये मम ॥५॥", h: "मुझे पुत्र की प्राप्ति हो, इसके लिये मैं पुत्रेष्टियज्ञ का फल देने वाले कमलनयन लक्ष्मी पति देवकी नन्दन श्री कृष्ण की वन्दना करता हूँ ॥5॥" },
            { id: 6, s: "पद्यापते पदानेत्र पदानाभ जनार्दन।<br>देहि मे तनयं श्रीश वासुदेव जगत्पते ॥६॥", h: "पद्मापते! कमलनयन ! पद्मनाभ! जनार्दन! श्रीश! वासुदेव! जगत्पते! मुझे पुत्र प्रदान कीजिये ॥6॥" },
            { id: 7, s: "यशोदांकगतं बालं गोविन्दं मुनिवन्दितम्।<br>अस्माकं पुत्रलाभाय नमामि श्रीशमच्युतम्‌ ॥७॥", h: "यशोदा के अंक में बाल रूप से विराजमान तथा अपनी महिमा से कभी च्युत न होने वाले मुनिवन्दित लक्ष्मी पति गोविन्द को मैं प्रणाम करता हूँ। ऐसा करने से मुझे पुत्र की प्राप्ति हो ॥7॥" },
            { id: 8, s: "श्रीपते देवदेवेश दीनार्तिहरणाच्युत।<br>गोविन्द मे सुतं देहि नमामि त्वां जनार्दन ॥८॥", h: "श्री पते! देवदेवेश्वर! दीन-दु:खियों की पीड़ा दूर करने वाले अच्युत! गोविन्द! मुझे पुत्र दीजिये। जनार्दन! मैं आपको प्रणाम करता हूँ ॥8॥" },
            { id: 9, s: "भक्तकामद गोविन्द भक्त रक्ष शुभप्रद।<br>देहि मे तनयं कृष्ण रुक्मिणीवल्लभ प्रभो ॥९॥", h: "भक्तों की कामना पूर्ण करने वाले गोविन्द! भक्त की रक्षा कीजिये। शुभदायक! रुक्मिणीवल्लभ! प्रभो! श्रीकृष्ण! मुझे पुत्र प्रदान कीजिये ॥9॥" },
            { id: 10, s: "रुक्मिणीनाथ सर्वेश देहि मे तनयं सदा।<br>भक्तमन्दार पद्माक्ष त्वामहं शरणं गत: ॥१०॥", h: "रुक्मिणीनाथ ! सर्वेश्वर! मुझे सदा के लिये पुत्र दीजिये। भक्तों की इच्छा पूर्ण करने के लिये कल्पवृक्ष स्वरूप कमलनयन श्री कृष्ण! मैं आपकी शरण में आया हूँ ॥10॥" },
            { id: 11, s: "देवकीसुत गोविन्द वासुदेव जगत्पते।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गतः। ॥११॥", h: "देवकी पुत्र! गोविन्द! वासुदेव! जगन्नाथ! श्री कृष्ण! मुझे पुत्र दीजिये। मैं आपकी शरण में आया हूँ ॥11॥" },
            { id: 12, s: "वासुदेव जगद्वन्द्य श्रीपते पुरुषोत्तम।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गत: ॥१२॥", h: "विश्ववन्द्य वासुदेव ! लक्ष्मीपते ! पुरुषोत्तम ! श्रीकृष्ण! मुझे पुत्र दीजिये। मैं आपकी शरण में आया हूँ ॥12॥" },
            { id: 13, s: "कज्जाक्ष कमलानाथ परकारुणिकोत्तम ।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गतः ॥१३॥", h: "कमलनयन! कमलाकान्त! दूसरों पर दया करने वालों में सर्वश्रेष्ठ श्रीकृष्ण । मुझे पुत्र प्रदान कीजिये। मैं आपकी शरण में आया हूँ ॥13॥" },
            { id: 14, s: "लक्ष्मीपते पद्मनाभ मुकुन्द मुनिवन्दित।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गत: ॥१४॥", h: "लक्ष्मीपते । पद्मनाभ ! मुनिवन्दित मुकुन्द ! श्रीकृष्ण ! मुझे पुत्र दीजिये। मैं आपकी शरण में आया हूँ ॥14॥" },
            { id: 15, s: "कार्यकारणरूपाय वासुदेवाय ते सदा।<br>नमामि पुत्रलाभार्थ सुखदाय बुधाय ते ॥१५॥", h: "आप कार्य-कारण रूप, सुखदायक एवं विद्वान्‌ हैं। मैं पुत्र की प्राप्ति के लिये आप वासुदेव को सदा नमस्कार करता हूँ ॥15॥" },
            { id: 16, s: "राजीवनेत्र श्रीराम रावणारे हरे कवे।<br>तुभ्यं नमामि देवेश तनयं देहि मे हरे ॥१६॥", h: "राजीवनेत्र (कमलनयन) ! रावणारे (रावण के शत्रु)! हरे! कवे (विद्वन्‌) ! देवेश्वर! विष्णो! मैं आपको प्रणाम करता हूँ। आप मुझे पुत्र प्रदान कीजिये ॥16॥" },
            { id: 17, s: "अस्माकं पुत्रलाभाय भजामि त्वां जगत्पते।<br>देहि मे तनयं कृष्ण वासुदेव रमापते ॥१७॥", h: "जगदीश्वर ! मैं अपने लिये पुत्र-प्राप्ति के उद्देश्य से आपकी आराधना करता हूँ। रमावल्लभ ! वासुदेव ! श्री कृष्ण! मुझे पुत्र दीजिये ॥17॥" },
            { id: 18, s: "श्रीमानिनीमानचोर गोपीवस्त्रापहारक ।<br>देहि मे तनयं कृष्ण वासुदेव जगत्पते ॥१८॥", h: "मानिनी श्री राधा के अपहरण करने वाले तथा अपनी आराधना करने वाली गोपांगनाओं के वस्त्र को यमुना तट से हटाने वाले (उन्हें सुख प्रदान करने वाले) जगन्नाथ ! वासुदेव ! श्रीकृष्ण ! मुझे पुत्र दीजिये ॥18॥" },
            { id: 19, s: "अस्माकं पुत्रसम्प्राप्ति कुरुष्व यदुनन्दन।<br>रमापते वासुदेव मुकुन्द मुनिवन्दित ॥१९॥", h: "यदुनन्दन! रमापते! वासुदेव! मुनिवन्दित मुकुन्द! हमें पुत्र की प्राप्ति कराइये ॥19॥" },
            { id: 20, s: "वासुदेव सुतं देहि तनयं देहि माधव।<br>पुत्रं मे देहि श्रीकृष्ण बत्सं देहि महाप्रभो ॥२०॥", h: "वासुदेव ! मुझे बेटा दीजिये। माधव! मुझे तनय (संतान) दीजिये। श्रीकृष्ण! मुझे पुत्र दीजिये। महाप्रभो! मुझे वत्स (बच्चा) दीजिये ॥20॥" },
            { id: 21, s: "डिम्भकं देहि श्रीकृष्ण आत्मजं देहि राघव।<br>भक्तमन्दार मे देहि तनयं नन्दनन्दन ॥२१॥", h: "श्री कृष्ण! मुझे डिंभक (पुत्र) दीजिये। रघुनन्दन! मुझे आत्मज (औरस पुत्र) दीजिये। भक्तों की अभिलाषा पूर्ण करने के लिये कल्पवृक्ष स्वरूप नन्द! मुझे तनय दीजिये ॥21॥" },
            { id: 22, s: "नन्दनं देहि मे कृष्ण बासुदेव जगत्पते।<br>कमलानाथ गोविन्द मुकुन्द मुनिवन्दित ॥२२॥", h: "श्री कृष्ण ! वासुदेव! जगत्पते! कमलानाथ ! गोविन्द! मुनिवन्दित मुकुन्द! मुझे आनन्द दायक पुत्र प्रदान कीजिये ॥22॥" },
            { id: 23, s: "अन्यथा शरणं नास्ति त्वमेव शरणं मम।<br>सुतं देहि श्रियं देहि श्रियं पुत्र प्रदेहि मे ॥२३॥", h: "प्रभो! यदि आप ऐसा नहीं करेंगे तो दूसरा कोई मुझे शरण देने वाला नहीं है। आप ही मेरे शरणदाता हैं। मुझे पुत्र दीजिये। सम्पत्ति दीजिये। सम्पत्ति और पुत्र दोनों प्रदान कीजिये ॥23॥" },
            { id: 24, s: "यशोदास्तन्यपानज्ञं पिबन्तं यदुनन्दनम्‌।<br>वन्देडहं पुत्रलाभार्थ कपिलाक्ष हरिं सदा ॥२४॥", h: "यशोदाजी के स्तनों के दुग्धपान के रस को जानने वाले और उनका स्तनपान करने वाले, भूरे नेत्रों से सुशोभित यदुनन्दन श्री कृष्ण की मैं सदा वन्दना करता हूँ। इससे मुझे पुत्र की प्राप्ति हो ॥24॥" },
            { id: 25, s: "नन्दनन्दन देवेश नन्दनं देहि मे प्रभो।<br>रमापते वासुदेव अ्रियं पुत्र जगत्पते ॥२५॥", h: "देवेश्वर ! नन्दनन्दन! प्रभो! मुझे आनन्द दायक पुत्र दीजिये। रमापते! वासुदेव! जगन्नाथ! मुझे धन और पुत्र दीजिये ॥25॥" },
            { id: 26, s: "पुत्रं श्रियं श्रियं पुत्र पुत्र मे देहि माधव।<br>अस्माकं दीनवाक्यस्य अवधारय श्रीपते ॥२६॥", h: "माधव ! पुत्र और धन (दीजिये), धन और पुत्र (दीजिये), मुझे पुत्र प्रदान कीजिये। श्रीपते ! हमारे दीनता पूर्ण बचन पर ध्यान दीजिये ॥ 26 ॥" },
            { id: 27, s: "गोपालडिम्भ गोविन्द बासुदेव रमापते।<br>अस्माकं डिम्भकं देहि श्रियं देहि जगत्पते ॥२७॥", h: "गोपकुमार गोविन्द । रमावल्लभ वासुदेव ! जगन्नाथ ! मुझे पुत्र दीजिये, सम्पत्ति दीजिये ॥ 27 ॥" },
            { id: 28, s: "मद्बवाज्छितफलं देहि देवकीनन्दनाच्युत।<br>मम पुत्रार्थितं धन्यं कुरुष्व यदुनन्दन ॥२८॥", h: "देवकीनन्दन ! अच्युत! मुझे मनोवांछित फल (पुत्र) दीजिये। यदुनन्दन ! मेरी पुत्र विषयक प्रार्थना कों सफल एवं धन्य कीजिये ॥ 28 ॥" },
            { id: 29, s: "याचेउहं त्वां श्रियं पुत्र देहि मे पुत्रसम्पदम्‌।<br>भक्तचिन्तामणे राम कल्पवृक्ष महाप्रभो ॥२९॥", h: "भक्तों के लिये चिन्तामणि स्वरूप राम! भक्तवांछाकल्पतरो! महाप्रभो! मैं आपसे धन और पुत्र की याचना करता हूँ। मुझे पुत्र और धन-सम्पत्ति दीजिये ॥ 29 ॥" },
            { id: 30, s: "आत्मजं नन्दनं पुत्र कुमारं डिम्भक सुतम्‌।<br>अर्भक॑ तनयं देहि सदा मे रघुनन्दन ॥३०॥", h: "रघुनन्दन! आप सदा मुझे आनन्द दायक आत्मज, पुत्र, कुमार, डिंभक (बालक), सुत, अर्भक (बच्चा) एवं तनय (बेटा) दीजिये ॥ 30 ॥" },
            { id: 31, s: "वन्दे संतानगोपालं माधव भक्तकामदम्‌।<br>अस्माकं पुत्रसम्प्राप्ये सदा गोविन्दमच्युतम्‌ ॥३१॥", h: "मैं अपने लिये पुत्र की प्राप्ति के उद्देश्य से संतानप्रद गोपाल, माधव, भक्तों का मनोरथ पूर्ण करने वाले अच्युत गोविन्द की वन्दना करता हूँ ॥ 31 ॥" },
            { id: 32, s: "ॐ“कारयुक्तं गोपाल श्रीयुक्ते यदुनन्दनम्‌।<br>क्लींयुक्त देवकीपुत्रं नमामि यदुनायकम्‌ ॥३२॥", h: "ॐ कार युक्त गोपाल, श्रीयुक्त यदुनन्दन तथा क्लींयुक्त देवकीपुत्र यदुनाथ को मैं प्रणाम करता हूँ (अर्थात्‌ “ॐ श्रीं क्लीं’ इन तीनों बीजों से युक्त ‘देवकीसुत गोविन्द……’ इत्यादि मन्त्र का मैं आश्रय लेता हूँ) ॥ 32 ॥" },
            { id: 33, s: "वासुदेव मुकुन्देश गोविन्द माधवाच्युत।<br>देहि मे तनयं कृष्ण रमानाथ महाप्रभो ॥३३॥", h: "वासुदेव। मुकुन्द! ईश्वर ! गोविन्द! माधव! अच्युत! श्रीकृष्ण। रमानाथ ! महाप्रभो ! मुझे पुत्र दीजिये ॥ 33 ॥" },
            { id: 34, s: "राजीवनेत्र गोविन्द कपिलाक्ष हरे प्रभो।<br>समस्तकाम्यवरद देहि मे तनयं सदा ॥३४॥", h: "राजीवनयन (कमल-सदृश नेत्र वाले) ! गोविन्द! कपिलाक्ष! हरे! प्रभो! सम्पूर्ण कमनीय मनोरथों की सिद्धि के लिये वर देने वाले श्री कृष्ण! मुझे सदा के लिये पुत्र दीजिये ॥ 34 ॥" },
            { id: 35, s: "अब्जपदानिभं पद्मवृन्दरूप जगत्पते।<br>देहि मे वरसत्पुत्रं रमानायक माधव ॥३५॥", h: "नीलकमल समूह के समान श्याम सुन्दर रूप वाले जगन्नाथ! रमानायक! माधव! मुझे जलज–कमल के सदृश मनोहर एवं श्रेष्ठ सत्पुत्र प्रदान कीजिये ॥ 35 ॥" },
            { id: 36, s: "नन्दपाल धरापाल गोविन्द यदुनन्दन।<br>देहि मे तनयं कृष्ण रुक्मिणीवल्लभ प्रभो ॥३६॥", h: "अजगर और वरुण के दूतों से नन्दजी की रक्षा करने वाले! पृथ्वी पालक ! यदुनन्दन ! गोविन्द ! प्रभो ।! रुक्मिणीवल्लभ श्री कृष्ण !मुझे पुत्र प्रदान कीजिये॥ 36॥" },
            { id: 37, s: "दासमन्दार गोविन्द मुकुन्द माधवाच्युत ।<br>गोपाल पुण्डरीकाक्ष देहि मे तनयं श्रियम् ॥३७ ॥", h: "अपने सेवकों की इच्छा पूर्ण करने के लिये कल्पवृक्ष स्वरूप ! गोविन्द ! मुकुन्द ! माधव ! अच्युत ! गोपाल! पुण्डरीकाक्ष (कमलनयन) ! मुझे संतान और सम्पत्ति दीजिये॥ 37॥" },
            { id: 38, s: "मदुनायक पद्मेश नन्दगोपवधूसुत।<br>देहि मे तनयं कृष्ण श्रीधर प्राणनायक ॥३८॥", h: "यदुनायक! लक्ष्मीपते! यशोदा नन्दन! श्रीधर! प्राणवल्लभ ! श्री कृष्ण! मुझे पुत्र प्रदान कीजिये ॥ 38 ॥" },
            { id: 39, s: "अस्माक॑ वाञ्छितं देहि देहि पुत्र रमापते।<br>भगवन्‌ कृष्ण सर्वेश वासुदेव जगत्पते ॥३९॥", h: "रमापते ! भगवन्‌! सर्वेश्वर ! वासुदेव । जगत्पते ! श्री कृष्ण! हमें मनोवांछित वस्तु दीजिये। पुत्र प्रदान कीजिये ॥ 39 ॥" },
            { id: 40, s: "रमाहृदयसम्भार सत्यभामामनःप्रिय ।<br>देहि मे तनयं कृष्ण रुक्मिणीवल्लभ प्रभो ॥४०॥", h: "रमा (लक्ष्मी) को अपने वक्ष:स्थल में धारण करने वाले! सत्यभामा के हृदयवल्लभ तथा रुक्मिणी के प्राणनाथ ! प्रभो! मुझे पुत्र दीजिये ॥ 40 ॥" },
            { id: 41, s: "चन्द्रसूर्याक्ष गोविन्द पुण्डरीकाक्ष माधव ।<br>अस्माकं भाग्यसत्पुत्रं देहि देव जगत्पते ॥४१॥", h: "चन्द्रमा और सूर्य रूप नेत्र धारण करने वाले गोविन्द। कमलनयन ! माधव! देव! जगदीश्वर ! हमें भाग्यशाली श्रेष्ठ पुत्र प्रदान कीजिये ॥ 41॥" },
            { id: 42, s: "कारुण्यरूप पद्माक्ष पद्मनाभसमर्चित।<br>देहि मे तनयं कृष्ण देवकीनन्दनन्दन ॥४२॥", h: "करुणामय! कमलनयन! पद्मनाभ श्री विष्णु से सम्मानित देवकी नन्द नन्दन श्री कृष्ण! मुझे पुत्र दीजिये ॥ 42 ॥" },
            { id: 43, s: "देवकीसुत श्रीनाथ वासुदेव जगत्पते।<br>समस्तकामफलद देहि मे तनयं सदा ॥४३॥", h: "देवकी पुत्र ! श्रीनाथ! वासुदेव ।! जगत्पते! समस्त मनोवांछित फलों को देने वाले श्री कृष्ण! मुझे सदा पुत्र दीजिये ॥ 43 ॥" },
            { id: 44, s: "भक्तमन्दार गम्भीर शंकराच्युत माधव।<br>देहि मे तनयं गोपबालवत्सल श्रीपते ॥४४॥", h: "भक्तवांछाकल्पतरो! गंभीर स्वभाव वाले कल्याणकारी अच्युत! माधव! ग्वाल- स्नेह करने वाले श्रीपते। मुझे पुत्र दीजिये ॥ 44 ॥" },
            { id: 45, s: "श्रीपते वासुदेवेश देवकीप्रियनन्दन।<br>भक्तमन्दार मे देहि तनयं जगतां प्रभो ॥४५॥", h: "श्रीकान्त ! वसुदेव नन्दन ! ईश्वर ! देवकी के प्रिय पुत्र! भक्तों के लिये कल्प वृक्ष रूप । जगत्प्रभो! मुझे पुत्र दीजिये ॥ 45॥" },
            { id: 46, s: "जगन्नाथ रमानाथ भूमिनाथ दयानिधे।<br>वासुदेवेश सर्वेश देहि मे तनयं प्रभो ॥४६॥", h: "जगन्नाथ! रमानाथ! पृथ्वीनाथ! दयानिधे! वासुदेव! ईश्वर ! सर्वेश्वर! प्रभो! मुझे पुत्र प्रदान कीजिये ॥ 46॥" },
            { id: 47, s: "श्रीनाथ कमलपत्राक्ष वासुदेव जगत्पते।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गत: ॥४७॥", h: "श्रीनाथ । कमलदललोचन ! वासुदेव ! जगत्पते ! श्रीकृष्ण ! मुझे पुत्र दीजिये, मैं आपकी शरण में आया हूँ ॥ 47॥" },
            { id: 48, s: "दासमन्दार गोविन्द भक्तचिन्तामणे प्रभो।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गत: ॥४८॥", h: "अपने दासों के लिये कल्पवृक्ष ! गोविन्द ! भक्तों की इच्छापूर्ति के लिये चिन्तामणि-स्वरूप प्रभो! श्री कृष्ण! मैं आपकी शरण में आया हूँ, मुझे पुत्र प्रदान कीजिये ॥ 48 ॥" },
            { id: 49, s: "गोविन्द पुण्डरीकाक्ष रमानाथ महाप्रभो ।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गत: ॥४९॥", h: "गोविन्द! पुंडरीकाक्ष! रमानाथ! महाप्रभो! श्रीकृष्ण! मुझे पुत्र दीजिये। मैं आपकी शरण में आया हूँ ॥ 49 ॥" },
            { id: 50, s: "श्रीनाथ कमलपत्राक्ष गोविन्द मधुसूदन।<br>मत्पुत्रफलसिद्ध्यर्थ भजामि त्वां जनार्दन ॥५०॥", h: "श्रीनाथ! कमलदललोचन! गोविन्द! मधुसूदन! जनार्दन! मैं अपने लिये पुत्र रूप फल की सिद्धि के निमित्त आपकी आराधना करता हूँ ॥ 50॥" },
            { id: 51, s: "स्तन्यं पिबन्तं जननीमुखाम्बुजं<br>विलोक्य मन्दस्मितमुज्ज्वलाङ्गम्‌<br>स्पृशन्तमन्यस्तनमङ्गुलीभि-<br>वन्दे यशोदाङ्कगतं मुकुन्दम्‌ ॥५१॥", h: "जो मैया यशोदा के मुखारविन्द की ओर देखते हुए मन्द मुस्कुराहट के साथ उनके एक स्तन का दूध पी रहे हैं और दूसरे स्तन का अंगुलियों से स्पर्श कर रहे हैं तथा जिन का प्रत्येक अंग उज्ज्वल आभा से प्रकाशित होता है, मैया यशोदा के अंक में बैठे हुए उन बाल-मुकुन्द की मैं वन्दना करता हूँ ॥ 51॥" },
            { id: 52, s: "याचेऽहं पुत्रसन्तानं भवन्तं पद्मलोचन।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गत: ॥५२॥", h: "कमललोचन! मैं आप से पुत्र–संतति की याचना करता हूँ। श्री कृष्ण! मुझे पुत्र दीजिये, मैं आपकी शरण में आया हूँ॥ 52 ॥" },
            { id: 53, s: "अस्माकं पुत्रसम्पत्तेश्चिन्तयामि जगत्पते।<br>शीघ्र मे देहि दातव्यं भवता मुनिवन्दित ॥५३॥", h: "जगत्पते ! हमें पुत्र की प्राप्ति हो, इस उद्देश्य से हम आपका चिन्तन करते हैं। आप मुझे शीघ्र पुत्र प्रदान कीजिये। मुनिवन्दित श्री कृष्ण! आपको मुझे अवश्य मेरी प्रार्थित वस्तु–संतान देनी चाहिये ॥ 53 ॥" },
            { id: 54, s: "वासुदेव जगन्नाथ श्रीपते पुरुषोत्तम।<br>कुरु मां पुत्रदत्तं च कृष्ण देवेन्द्रपूजित ॥५४॥", h: "वासुदेव ! जगन्नाथ ! श्री पते ! पुरुषोत्तम ! देवेन्द्र पूजित श्रीकृष्ण ! मुझे पुत्र-दान कीोजिये॥ 54 ॥" },
            { id: 55, s: "कुरु मां पुत्रदत्तं च यशोदाप्रियनन्दन।<br>महां च पुत्रसंतानं दातव्यं भवता हरे ॥५५॥", h: "यशोदा के प्रिय नन्दन! मुझे पुत्र प्रदान कीजिये। हरे! आपको मुझे पुत्र रूप संतान का दान अवश्य करना चाहिये॥ 55 ॥" },
            { id: 56, s: "वासुदेव जगन्नाथ गोविन्द देवकीसुत।<br>देहि मे तनयं राम कौसल्याप्रियनन्दन ॥५६॥", h: "वासुदेव ! जगन्नाथ! गोविन्द! देवकीकुमार! कौसल्या के प्रिय पुत्र राम! मुझे पुत्र प्रदान कीजिये॥ 56 ॥" },
            { id: 57, s: "पद्वपत्राक्ष गोविन्द विष्णो वामन माधव।<br>देहि मे तनयं सीताप्राणनायक राघव ॥५७॥", h: "कमलदललोचन! गोविन्द! विष्णो! वामन! माधव ! सीता के प्राण बल्लभ! रघुनन्दन! मुझे पुत्र दीजिये ॥ 57 ॥" },
            { id: 58, s: "कज्जाक्ष कृष्ण देवेन्द्रमण्डित मुनिवन्दित ।<br>लक्ष्मणाग्रज श्रीराम देहि मे तनयं सदा ॥५८॥", h: "कमलनयन श्री कृष्ण! देवराज से अलंकृत एवं पूजित हरे! लक्ष्मण के बड़े भैया मुनि वन्दित श्रीराम! मुझे सदा के लिये पुत्र प्रदान कीजिये॥ 58 ॥" },
            { id: 59, s: "देहि मे तनयं राम दशरथप्रियनन्दन।<br>सीतानायक कज्जाक्ष मुचुकुन्दवरप्रद ॥५९॥", h: "दशरथ के प्रिय नन्दन श्री राम ! सीतापते ! कमलनयन ! मुचुकुन्द को वर देने वाले श्री कृष्ण! मुझे पुत्र दीजिये॥ 59 ॥" },
            { id: 60, s: "विभीषणस्य या लङ्का प्रदत्ता भवता पुरा।<br>अस्माकं तत्प्रकारेण तनयं देहि माधव ॥६०॥", h: "माधव! आपने पूर्वकाल में जो विभीषण को लंका का राज्य दिया था, उसी प्रकार हमें पुत्र दीजिये॥ 60 ॥" },
            { id: 61, s: "भवदीयपदाम्भोजे चिन्तयामि निरन्तरम्‌।<br>देहि मे तनयं सीताप्राणवल्लभ राघव ॥६१॥", h: "सीता के प्राणवल्लभ रघुनन्दन! में आपके चरणारविन्दों का निरन्तर चिन्तन करता हूँ, मुझे पुत्र प्रदान कीजिये॥ 61॥" },
            { id: 62, s: "राम मत्काम्यवरद पुत्रोत्पत्तिफलप्रद।<br>देहि मे तनयं श्रीश कमलासनवन्दित ॥६२॥", h: "मुझे मनोवांछित वर और पुत्रोत्पत्ति रूप फल देने वाले श्रीराम ! ब्रह्मा जी के द्वारा वन्दित लक्ष्मीपते! आप मुझे पुत्र दीजिये॥ 62॥" },
            { id: 63, s: "राम राघव सीतेश लक्ष्मणानुज देहि मे।<br>भाग्यवत्पुत्रसंतानं दशरथात्मज श्रीपते ॥६३॥", h: "लक्ष्मण के बड़े भाई! सीता के प्राणबल्लभ! दशरथ कुमार ! रघुकुल नन्दन! श्रीराम! श्रीपते! आप मुझे भाग्यशाली पुत्र रूप संतान दीजिये॥ 63 ॥" },
            { id: 64, s: "देवकीगर्भसंजात यशोदाप्रियनन्दन।<br>देहि मे तनयं राम कृष्ण गोपाल माधव ॥६४॥", h: "देवकी के गर्भ से उत्पन्न हुए यशोदा के लाड़ले लाल ! गोपाल कृष्ण! राम! माधव! मुझे पुत्र दीजिये॥ 64 ॥" },
            { id: 65, s: "कृष्ण माधव गोविन्द वामनाच्युत शंकर।<br>देहि मे तनयं श्रीश गोपबालकनायक ॥६५॥", h: "माधव! गोविन्द! वामन! अच्युत! कल्याणकारी श्रीपते! गोपबालकनायक! श्री कृष्ण! मुझे पुत्र दीजिये॥ 65 ॥" },
            { id: 66, s: "गोपबाल महाधन्य गोविन्दाच्युत माधव ।<br>देहि मे तनयं कृष्ण वासुदेव जगत्पते ॥६६॥", h: "गोपकुमार ! सबसे बढ़कर धन्य! गोविन्द! अच्युत! माधव! वासुदेव! जगत्पते ! श्री कृष्ण! मुझे पुत्र प्रदान कीजिये॥ 66॥" },
            { id: 67, s: "दिशतु दिशतु पुत्रं देवकीनन्दनोऽयं<br>दिशतु दिशतु शीघ्रं भाग्यवत्पुत्रलाभम्।<br>दिशतु दिशतु श्रीशो राघवो रामचन्द्रो<br>दिशतु दिशतु पुत्रं वंशविस्तारहेतो: ॥६७॥", h: "हे भगवान्‌ देवकीनन्दन मुझे पुत्र दीजिये, पुत्र दीजिये। शीघ्र ही भाग्यवान्‌ पुत्र की प्राप्ति करायें। श्री सीता के स्वामी! रघुकुलनन्दन श्री रामचन्द्र । मेरे वंश के विस्तार के लिये मुझे पुत्र प्रदान करें, पुत्र प्रदान करें॥ 67 ॥" },
            { id: 68, s: "दीयतां वासुदेवेन तनयो मत्प्रियः सुतः।<br>कुमारो नन्दनः सीतानायकेन सदा मम ॥६८॥", h: "वसुदेव नन्दन भगवान्‌ श्री कृष्ण तथा सीता पति भगवान्‌ श्री राम सदा मुझे आनन्द दायक कुमारोपम प्रिय पुत्र प्रदान करें ॥ 68 ॥" },
            { id: 69, s: "राम राघव गोविन्द देवकीसुत माधव ।<br>देहि मे तनयं श्रीश गोपबालकनायक ॥६९॥", h: "राम! राघव ! गोविन्द ! देवकी पुत्र ! माधव! श्रीपते! गोप बालक नायक श्रीकृष्ण ! मुझे पुत्र दीजिये॥ 69 ॥" },
            { id: 70, s: "वंशविस्तारकं पुत्रं देहि मे मधुसूदन।<br>सुतं देहि सुतं देहि त्वामहं शरणं गतः ॥७०॥", h: "मधुसूदन ! मुझे वंश का विस्तार करने वाला पुत्र दीजिये ! पुत्र दीजिये ! ! पुत्र दीजिये ! में आपकी शरण में आया हूँ॥ 70 ॥" },
            { id: 71, s: "ममाभीष्टसुतं देहि कंसारे माधवाच्युत।<br>सुतं देहि सुतं देहि त्वामहं शरणं गतः ॥७१॥", h: "कंसारे । माधव ! अच्युत ! मुझे मनोवांछित पुत्र प्रदान कीजिये । पुत्र दीजिये !! पुत्र दीजिये!!! में आपकी शरण में आया हूँ॥ 71॥" },
            { id: 72, s: "चन्द्रार्ककल्पपर्यन्तं तनयं देहि माधव।<br>सुतं देहि सुतं देहि त्वामहं शरणं गतः ॥७२॥", h: "माधव! जब तक चन्द्रमा, सूर्य और कल्प की स्थिति रहे, तब तक के लिये मुझे पुत्र परम्परा प्रदान कीजिये! पुत्र दीजिये !! पुत्र दीजिये!!! मैं आपकी शरण में आया हूँ॥ 72 ॥" },
            { id: 73, s: "विद्यावन्तं बुद्धिमन्तं श्रीमन्तं तनयं सदा।<br>देहि मे तनयं कृष्ण देवकीनन्दन प्रभो ॥७३॥", h: "देवकी नन्दन श्री कृष्ण! आप सदा मेरे लिये विद्वान, बुद्धिमान और धनसम्पन्न पुत्र प्रदान कीजिये॥ 73 ॥" },
            { id: 74, s: "नमामि त्वां पद्मनेत्र सुतलाभाय कामदम्‌।<br>मुकुन्दं पुण्डरीकाक्ष गोविन्दं मधुसूदनम्‌ ॥७४॥", h: "कमलनयन श्रीकृष्ण! मैं पुत्रकी प्राप्ति के लिये समस्त कामनाओं के दाता आप पुंडरीकाक्ष श्री कृष्ण मुकुन्द मधुसूदन गोविन्द को प्रणाम करता हूँ ॥ 74 ॥" },
            { id: 75, s: "भगवन्‌ कृष्ण गोविन्द सर्वकामफलप्रद ।<br>देहि मे तनयं स्वामिंस्त्वामहं शरणं गतः ॥७५॥", h: "सम्पूर्ण मनोवांछित फलों के दाता! गोविन्द! स्वामिन्·! भगवन्‌! श्री कृष्ण! मुझे पुत्र दीजिये। मैं आपकी शरण में आया हूँ॥ 75 ॥" },
            { id: 76, s: "स्वामिंस्त्वं भगवन्‌ राम कृष्ण माधव कामद।<br>देहि मे तनयं नित्यं त्वामहं शरणं गतः ॥७६॥", h: "स्वामिन्‌! भगवन्·! राम! कृष्ण! कामनाओं के दाता माधव! मुझे सदा पुत्र प्रदान कीजिये मैं आपकी शरण में आया हूँ॥ 76 ॥" },
            { id: 77, s: "तनयं देहि गोविन्द कज्जाक्ष कमलापते।<br>सुतं देहि सुतं देहि त्वामहं शरणं गत: ॥७७॥", h: "गोविन्द! कमलनयन! कमलापते! मुझे पुत्र दीजिये! पुत्र दीजिये!! पुत्र दीजिये!!! मैं आपकी शरण में आया हूँ ॥ 77 ॥" },
            { id: 78, s: "पद्मापते पद्मनेत्र प्रद्युम्नजनक प्रभो।<br>सुतं देहि सुतं देहि त्वामहं शरणं गतः ॥७८॥", h: "लक्ष्मीपते! कमललोचन! प्रद्युम्न को जन्म देने वाले प्रभो! मुझे पुत्र दीजिये! पुत्र दीजिये !! मैं आपकी शरण में आया हूँ॥ 78 ॥" },
            { id: 79, s: "शङ्खचक्रगदाखड्गशार्ङ्गपाणे रमापते।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गत: ॥७९॥", h: "अपने हाथों में शंख, चक्र, गदा, खड्ग और शार्ङ्गधनुष धारण करने वाले रमापते! श्री कृष्ण ! मुझे पुत्र प्रदान कीजिये। मैं आपकी शरण में आया हूँ ॥ 79 ॥" },
            { id: 80, s: "नारायण रमानाथ राजीवपत्रलोचन।<br>सुतं मे देहि देवेश पद्मपद्मानुवन्दित ॥८०॥", h: "नारायण! रमानाथ! कमलदललोचन ! देवेश्वर! कमलालया लक्ष्मी से वन्दित श्री कृष्ण! मुझे पुत्र प्रदान कीजिये॥ 80 ॥" },
            { id: 81, s: "राम राघव गोविन्द देवकीवरनन्दन।<br>रुक्मिणीनाथ सर्वेश नारदादिसुराचित ॥८१॥", h: "राम! राघव! गोविन्द! देवकी के श्रेष्ठ पुत्र! रुक्मिणीनाथ!सर्वेश्वर! नारदादि महर्षियों तथा देवताओं से पूजित देवकी कुमार गोविन्द! वासुदेव! जगत्पते! श्रीकान्त! गोप बालक नायक! मुझे पुत्र प्रदान कीजिये ॥ 81 ॥" },
            { id: 82, s: "देवकीसुत गोविन्द वासुदेव जगत्पते।<br>देहि मे तनयं श्रीश गोपबालकनायक ॥८२॥", h: "देवकी पुत्र गोविन्द! वासुदेव! जगत्पते! श्रीकान्त! गोप बालक नायक! मुझे पुत्र प्रदान कीजिये ॥ 82 ॥" },
            { id: 83, s: "मुनिवन्दित गोविन्द रुक्मिणीवल्लभ प्रभो।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गत: ॥८३॥", h: "मुनिवन्दित गोविन्द । रुक्मिणीवल्लभ! प्रभो! श्री कृष्ण! मुझे पुत्र दीजिये! मैं आपकी शरण में आया हूँ॥ 83 ॥" },
            { id: 84, s: "गोपिकार्जितपङ्कजमरन्दासक्तमानस ।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गत: ॥८४॥", h: "गोपियों द्वारा लाकर समर्पित किये गये कमलों के मकरन्द में आसक्त चित्त वाले श्री कृष्ण! मुझे पुत्र दीजिये। मैं आपकी शरण में आया हूँ॥ 84 ॥" },
            { id: 85, s: "रमाहृदयपङ्कजलोल माधव कामद।<br>ममाभीष्टसुतं देहि त्वामहं शरणं गत: ॥८५॥", h: "लक्ष्मी के हृदय कमल के लिये लोलुप माधव! समस्त कामनाओं के दाता श्री कृष्ण ! मुझे मनोवांछित पुत्र प्रदान कीजिये, मैं आपकी शरण में आया हूँ॥ 85 ॥" },
            { id: 86, s: "वासुदेव रमानाथ दासानां मंगलप्रद।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गत: ॥८६॥", h: "अपने सेवकों के लिये मंगलदायक रमानाथ ! वासुदेव ! श्रीकृष्ण ! मुझे पुत्र प्रदान कीजिये, मैं आपकी शरण में आया हूँ॥ 86 ॥" },
            { id: 87, s: "कल्याणप्रद गोविन्द मुरारे मुनिवन्दित।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गत: ॥८७॥", h: "कल्याणप्रद गोविन्द ! मुनिवन्दित मुरशत्रु श्री कृष्ण! मुझे पुत्र प्रदान कीजिये, मैं आपकी शरण में आया हूँ॥ 87 ॥" },
            { id: 88, s: "पुत्रप्रद मुकुन्देश रुक्मिणीवल्लभ प्रभो।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गत: ॥८८॥", h: "पुत्रदाता मुकुन्द! ईश्वर! रुक्मिणीवल्लभ प्रभो! श्री कृष्ण! मुझे पुत्र दीजिये, मैं आपकी शरण में आया हूँ॥ 88 ॥" },
            { id: 89, s: "पुण्डरीकाक्ष गोविन्द वासुदेव जगत्पते।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गत: ॥८९॥", h: "पुण्डरीकाक्ष । गोविन्द ! वासुदेव ! जगदीश्वर ! श्रीकृष्ण! मुझे पुत्र दीजिये, मैं आपकी शरण में आया हूँ ॥ 89 ॥" },
            { id: 90, s: "दयानिधे वासुदेव मुकुन्द मुनिवन्दित।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गत: ॥९०॥", h: "दयानिधे! वासुदेव । मुनिवन्दित मुकुन्द ! श्रीकृष्ण! मुझे पुत्र प्रदान कीजिये, मैं आपकी शरण में आया हूँ ॥ 90 ॥" },
            { id: 91, s: "पुत्रसम्पत्प्रदातारं गोविन्द देवपूजितम्‌।<br>वन्दामहे सदा कृष्णं पुत्रलाभप्रदायिनम्‌ ॥९१॥", h: "पुत्र और सम्पत्ति के दाता, पुत्र लाभ दायक, देव पूजित गोविन्द श्री कृष्ण की हम सदा वन्दना करते हैं ॥ 91 ॥" },
            { id: 92, s: "कारुण्यनिधये गोपीवल्लभाय मुरारये।<br>नमस्ते पुत्रलाभार्थ देहि मे तनयं विभो ॥९२॥", h: "प्रभो। आप करुणा के सागर, गोपियों के प्राणवल्लभ और मुर नामक दैत्य के शत्रु हैं, पुत्र की प्राप्ति के लिये आपको मेरा नमस्कार है, मुझे पुत्र प्रदान कीजिये ॥ 92 ॥" },
            { id: 93, s: "नमस्तस्मै रमेशाय रुक्मिणीवल्लभाय ते ।<br>देहि मे तनयं श्रीश गोपबालकनायक ॥९३॥", h: "लक्ष्मी के स्वामी तथा रुक्मिणी के प्राणवल्लभ ! आप भगवान्‌ श्री कृष्ण को नमस्कार है। गोपबालकों के नायक श्रीकान्त! मुझे पुत्र दीजिये ॥ 93 ॥" },
            { id: 94, s: "नमस्ते वासुदेवाय नित्यश्रीकामुकाय च।<br>पुत्रदाय च सर्पेन्द्रशायिने रंगशायिने ॥९४॥", h: "सदा ही श्रीजी की कामना रखने वाले आप वासुदेव को नमस्कार है। आप पुत्र दायक, नागराज शेष की शय्या पर शयन करने वाले तथा श्री रंग क्षेत्र में सोने वाले हैं, आपको नमस्कार है ॥ 94 ॥" },
            { id: 95, s: "रंगशायिने रमानाथ मङ्गलप्रद माधव।<br>देहि मे तनयं श्रीश गोपबालकनायक ॥९५॥", h: "रंगशायी रमानाथ! मंगल दायक माधव ! गोपबालक नायक श्रीपते ! मुझे पुत्र प्रदान कीजिये ॥ 95 ॥" },
            { id: 96, s: "दासस्य मे सुतं देहि दीनमन्दार राघव।<br>सुतं देहि सुतं देहि पुत्रं देहि रमापते ॥९६॥", h: "दीनों के लिये कल्प वृक्ष स्वरूप रघुनन्दन ! मुझ दास को पुत्र दीजिये। रमापते! पुत्र दीजिये। पुत्र दीजिये!!! पुत्र दीजिये!!! ॥ 96 ॥" },
            { id: 97, s: "यशोदातनयाभीष्टपुत्रदानरतः सदा।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गतः ॥९७॥", h: "सदा मनोवांछित पुत्र देने में तत्पर रहने वाले यशोदा नन्दन श्री कृष्ण! मैं आपकी शरण में आया हूँ, मुझे पुत्र प्रदान कीजिये ॥ 97॥" },
            { id: 98, s: "मदिष्टदेव गोविन्द वासुदेव जनार्दन।<br>देहि मे तनयं कृष्ण त्वामहं शरणं गतः ॥९८ ॥", h: "मेरे इष्टदेव गोविन्द! वासुदेव ! जनार्दन! श्री कृष्ण! मुझे पुत्र दीजिये, मैं आपकी शरण में आया हूँ ॥ 98 ॥" },
            { id: 99, s: "नीतिमान्‌ धनवान्‌ पुत्रो विद्यावांश्च प्रजायते।<br>भगवंस्त्वत्कृपायाश्च वासुदेवेन्द्रपूजित ॥९९॥", h: "भगवन्‌! इन्द्र पूजित वासुदेव! आपकी कृपा से नीतिज्ञ, धनवान्‌ और विद्वान्‌ पुत्र उत्पन्न होता है ॥ 99 ॥" },
            { id: 100, s: "यः पठेत्‌ पुत्रशतकं सोऽपि सत्पुत्रवान्‌ भवेत्‌।<br>श्रीवासुदेवकथितं स्तोत्ररत्नं सुखाय च ॥१००॥", h: "जो श्री वासुदेव कथित पुत्रशतक का पाठ करता है, वह भी उत्तम पुत्र से सम्पन्न होता है। यह स्तोत्ररत्न सुख की भी प्राप्ति कराने वाला है ॥ 100 ॥" },
            { id: 101, s: "जपकाले पठेन्नित्यं पुत्रलाभं धन श्रियम्‌।<br>ऐश्वर्य राजसम्मानं सद्यो याति न संशय: ॥१०१॥", h: "जो प्रतिदिन जप के समय इस का पाठ करता है, उसे तत्काल पुत्र लाभ होता है वह शीघ्र ही धन, सम्पत्ति, ऐश्वर्य एवं राज सम्मान प्राप्त कर लेता है, इसमें संशय नहीं है॥ 101॥" }
        ];

        const container = document.getElementById('stotraContainer');
        const searchInput = document.getElementById('searchVerse');

        // Function to render layout blocks cleanly
        function renderVerses(filterId = '') {
            container.innerHTML = '';
            const filtered = filterId 
                ? versesData.filter(v => v.id == filterId) 
                : versesData;

            if(filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">कोई श्लोक नहीं मिला।</div>';
                return;
            }

            filtered.forEach(verse => {
                const box = document.createElement('div');
                box.className = 'verse-box';
                box.innerHTML = `
                    <div class="sanskrit">${verse.s}</div>
                    <div class="hindi">${verse.h}</div>
                `;
                container.appendChild(box);
            });
        }

        // Live filtration monitor
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            renderVerses(val);
        });

        // Initialize display
        renderVerses();
    </script>
</body>
</html>
